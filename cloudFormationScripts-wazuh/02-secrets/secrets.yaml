AWSTemplateFormatVersion: '2010-09-09'
Description: 'ORBIT Node Secrets - Store passwords in AWS Secrets Manager (run once)'

Parameters:
  WazuhIndexerUsername:
    Type: String
    Description: Wazuh indexer username
    NoEcho: true

  WazuhIndexerPassword:
    Type: String
    Description: Wazuh indexer password
    NoEcho: true

  WazuhApiUsername:
    Type: String
    Description: Wazuh API username
    NoEcho: true

  WazuhApiPassword:
    Type: String
    Description: Wazuh API password
    NoEcho: true

  Neo4jUri:
    Type: String
    Description: Neo4j Aura connection URI
    NoEcho: true

  Neo4jUsername:
    Type: String
    Description: Neo4j username
    NoEcho: true

  Neo4jPassword:
    Type: String
    Description: Neo4j password
    NoEcho: true

  OrbitCoreApiToken:
    Type: String
    Description: ORBIT Core API token
    NoEcho: true

Resources:
  WazuhIndexerSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: orbit/node/wazuh-indexer-credentials
      Description: Wazuh indexer credentials
      SecretString:
        Fn::Sub:
          - '{"username":"${U}","password":"${P}"}'
          - U: !Ref WazuhIndexerUsername
            P: !Ref WazuhIndexerPassword
      Tags:
        - Key: Name
          Value: orbit-node-wazuh-indexer
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit

  WazuhApiSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: orbit/node/wazuh-api-credentials
      Description: Wazuh API credentials
      SecretString:
        Fn::Sub:
          - '{"username":"${U}","password":"${P}"}'
          - U: !Ref WazuhApiUsername
            P: !Ref WazuhApiPassword
      Tags:
        - Key: Name
          Value: orbit-node-wazuh-api
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  Neo4jSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: orbit/node/neo4j-credentials
      Description: Neo4j Aura credentials
      SecretString:
        Fn::Sub:
          - '{"uri":"${Uri}","username":"${U}","password":"${P}"}'
          - Uri: !Ref Neo4jUri
            U: !Ref Neo4jUsername
            P: !Ref Neo4jPassword
      Tags:
        - Key: Name
          Value: orbit-node-neo4j
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  OrbitCoreApiTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: orbit/node/orbit-core-api-token
      Description: ORBIT Core API token
      SecretString: !Ref OrbitCoreApiToken
      Tags:
        - Key: Name
          Value: orbit-node-core-token
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

Outputs:
  WazuhIndexerSecretArn:
    Description: Wazuh indexer credentials secret ARN
    Value: !Ref WazuhIndexerSecret
    Export:
      Name: !Sub '${AWS::StackName}-WazuhIndexerSecretArn'

  WazuhApiSecretArn:
    Description: Wazuh API credentials secret ARN
    Value: !Ref WazuhApiSecret
    Export:
      Name: !Sub '${AWS::StackName}-WazuhApiSecretArn'

  Neo4jSecretArn:
    Description: Neo4j credentials secret ARN
    Value: !Ref Neo4jSecret
    Export:
      Name: !Sub '${AWS::StackName}-Neo4jSecretArn'

  OrbitCoreApiTokenSecretArn:
    Description: ORBIT Core API token secret ARN
    Value: !Ref OrbitCoreApiTokenSecret
    Export:
      Name: !Sub '${AWS::StackName}-OrbitCoreApiTokenSecretArn'
