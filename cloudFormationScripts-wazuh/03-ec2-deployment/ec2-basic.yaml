AWSTemplateFormatVersion: '2010-09-09'
Description: 'ORBIT Node EC2 - Basic instance with Docker and EBS mount only'

Parameters:
  VpcId:
    Type: String
    Description: VPC ID from pre-deployment stack output

  SubnetId:
    Type: String
    Description: Subnet ID from pre-deployment stack output

  SecurityGroupId:
    Type: String
    Description: Security Group ID from pre-deployment stack output

  InstanceProfileArn:
    Type: String
    Description: IAM Instance Profile ARN from pre-deployment stack output

  DataVolumeId:
    Type: String
    Description: EBS Volume ID from pre-deployment stack output

  ElasticIPAllocationId:
    Type: String
    Description: Elastic IP Allocation ID from pre-deployment stack output

  ElasticIP:
    Type: String
    Description: Elastic IP address from pre-deployment stack output

  DataMountPath:
    Type: String
    Default: '/data'
    Description: Mount path for persistent data

  EbsDeviceName:
    Type: String
    Default: '/dev/sdf'
    Description: EBS device name for volume attachment

  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type

  UseSpotInstance:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Use Spot instance (true) or On-Demand (false)

  MaxSpotPrice:
    Type: String
    Default: '0.04'
    Description: Max Spot price. Used only when UseSpotInstance is true.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for SSH access

Conditions:
  UseSpotInstance: !Equals [ !Ref UseSpotInstance, 'true' ]

Resources:
  OrbitNodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: orbit-node-template
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        ImageId: !Sub '{{resolve:ssm:/aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}'
        KeyName: !Ref KeyName
        IamInstanceProfile:
          Arn: !Ref InstanceProfileArn
        SecurityGroupIds:
          - !Ref SecurityGroupId
        InstanceMarketOptions: !If
          - UseSpotInstance
          - MarketType: spot
            SpotOptions:
              MaxPrice: !Ref MaxSpotPrice
              SpotInstanceType: one-time
          - !Ref AWS::NoValue
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: orbit-node-poc
              - Key: Environment
                Value: poc
              - Key: Component
                Value: node
              - Key: Owner
                Value: orbit
              - Key: project
                Value: iiith-orbit-node
              - Key: created_by
                Value: vvithala
              - Key: resource_type
                Value: dev
        UserData:
          Fn::Base64:
            !Sub |
              #!/bin/bash
              set -e
              exec > >(tee /var/log/user-data.log)
              exec 2>&1
              
              echo "=========================================="
              echo "ORBIT Node Bootstrap - $(date)"
              echo "=========================================="
              
              export DEBIAN_FRONTEND=noninteractive
              export DATA_MOUNT_PATH="${DataMountPath}"
              
              # Install prerequisites
              echo "[1/3] Installing prerequisites..."
              apt-get update && apt-get upgrade -y
              apt-get install -y ca-certificates curl gnupg lsb-release git jq awscli nginx
              
              # Install Docker
              echo "[2/3] Installing Docker..."
              mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
              apt-get update
              apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              usermod -aG docker ubuntu
              
              # Get AWS region
              export AWS_DEFAULT_REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region)
              echo "AWS Region: $AWS_DEFAULT_REGION"
              
              # Mount EBS volume
              echo "[3/3] Mounting EBS volume..."
              sleep 10
              DEVICE=""
              for i in $(seq 1 30); do
                [ -b /dev/nvme1n1 ] && DEVICE=/dev/nvme1n1 && break
                [ -b ${EbsDeviceName} ] && DEVICE=${EbsDeviceName} && break
                sleep 2
              done
              
              if [ -z "$DEVICE" ]; then
                echo "ERROR: EBS device not found"
                exit 1
              fi
              
              if ! blkid $DEVICE 2>/dev/null; then
                mkfs -t ext4 $DEVICE
              fi
              
              mkdir -p $DATA_MOUNT_PATH
              mount $DEVICE $DATA_MOUNT_PATH
              UUID=$(blkid -s UUID -o value $DEVICE)
              echo "UUID=$UUID $DATA_MOUNT_PATH ext4 defaults,nofail 0 2" >> /etc/fstab
              
              # Create data directories
              mkdir -p $DATA_MOUNT_PATH/wazuh-indexer
              mkdir -p $DATA_MOUNT_PATH/wazuh
              mkdir -p $DATA_MOUNT_PATH/orbit-node
              chown -R 1000:1000 $DATA_MOUNT_PATH/wazuh-indexer 2>/dev/null || true
              
              echo "=========================================="
              echo "Bootstrap Complete - $(date)"
              echo "Ready for Ansible deployment"
              echo "=========================================="

  OrbitNodeInstance:
    Type: AWS::EC2::Instance
    DependsOn: OrbitNodeLaunchTemplate
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref OrbitNodeLaunchTemplate
        Version: !GetAtt OrbitNodeLaunchTemplate.LatestVersionNumber
      SubnetId: !Ref SubnetId
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: orbit-node-poc
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  VolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: !Ref EbsDeviceName
      InstanceId: !Ref OrbitNodeInstance
      VolumeId: !Ref DataVolumeId

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref OrbitNodeInstance
      AllocationId: !Ref ElasticIPAllocationId

Outputs:
  NodeInstanceId:
    Description: ORBIT Node EC2 Instance ID
    Value: !Ref OrbitNodeInstance
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'

  NodePublicIp:
    Description: ORBIT Node Public IP (Elastic IP from pre-deployment)
    Value: !Ref ElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-PublicIp'

  SSHCommand:
    Description: SSH command to connect to instance
    Value: !Sub 'ssh ubuntu@${ElasticIP}'
