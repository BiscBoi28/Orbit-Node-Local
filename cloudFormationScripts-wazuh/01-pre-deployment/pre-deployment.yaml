AWSTemplateFormatVersion: '2010-09-09'
Description: 'ORBIT Node Pre-Deployment - VPC, Networking, Security Group, IAM, EBS (run once)'

Parameters:
  VpcId:
    Type: String
    Description: VPC ID (leave empty to create new VPC)
    Default: ''

  SubnetId:
    Type: String
    Description: Subnet ID (leave empty to create new subnet)
    Default: ''

  AdminIpCidr:
    Type: String
    Default: '0.0.0.0/0'
    Description: CIDR block for SSH access (POC only - restrict in production)

  EbsVolumeSize:
    Type: Number
    Default: 100
    MinValue: 50
    MaxValue: 500
    Description: Size of EBS volume for persistent data (GB)

  EbsDeviceName:
    Type: String
    Default: '/dev/sdf'
    Description: Device name for EBS volume attachment

  DataMountPath:
    Type: String
    Default: '/data'
    Description: Mount path for persistent data volume

Conditions:
  CreateVpc: !Equals [!Ref VpcId, '']
  CreateSubnet: !Equals [!Ref SubnetId, '']

Resources:
  # VPC Resources (created only if not provided)
  OrbitNodeVpc:
    Type: AWS::EC2::VPC
    Condition: CreateVpc
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: orbit-node-poc-vpc
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  OrbitNodeInternetGateway:
    Type: AWS::EC2::InternetGateway
    Condition: CreateVpc
    Properties:
      Tags:
        - Key: Name
          Value: orbit-node-poc-igw
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Condition: CreateVpc
    Properties:
      VpcId: !Ref OrbitNodeVpc
      InternetGatewayId: !Ref OrbitNodeInternetGateway

  OrbitNodeSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreateSubnet
    Properties:
      VpcId: !If [CreateVpc, !Ref OrbitNodeVpc, !Ref VpcId]
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: orbit-node-poc-subnet
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  OrbitNodeRouteTable:
    Type: AWS::EC2::RouteTable
    Condition: CreateVpc
    Properties:
      VpcId: !Ref OrbitNodeVpc
      Tags:
        - Key: Name
          Value: orbit-node-poc-rt
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  OrbitNodeRoute:
    Type: AWS::EC2::Route
    Condition: CreateVpc
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref OrbitNodeRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref OrbitNodeInternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateSubnet
    Properties:
      SubnetId: !Ref OrbitNodeSubnet
      RouteTableId: !Ref OrbitNodeRouteTable

  # Security Group
  OrbitNodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: orbit-node-poc-sg
      GroupDescription: Security group for ORBIT Node POC
      VpcId: !If [CreateVpc, !Ref OrbitNodeVpc, !Ref VpcId]
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP redirect to HTTPS (POC - restrict in production)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS access (POC - restrict in production)
        - IpProtocol: tcp
          FromPort: 3110
          ToPort: 3110
          CidrIp: 0.0.0.0/0
          Description: API port (POC - restrict in production)
        - IpProtocol: tcp
          FromPort: 3111
          ToPort: 3111
          CidrIp: 0.0.0.0/0
          Description: UI port (POC - restrict in production)
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminIpCidr
          Description: SSH access for admin
        - IpProtocol: tcp
          FromPort: 1514
          ToPort: 1515
          CidrIp: 0.0.0.0/0
          Description: Wazuh agent (1514 registration, 1515 keepalive)
        - IpProtocol: udp
          FromPort: 514
          ToPort: 514
          CidrIp: 0.0.0.0/0
          Description: Wazuh agent syslog (optional)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: orbit-node-poc-sg
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  # IAM Role for EC2 Instance
  OrbitNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: OrbitNodeSecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:orbit/*'
        - PolicyName: OrbitNodeS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - 'arn:aws:s3:::orbit-node-config-1770558079'
                  - 'arn:aws:s3:::orbit-node-config-1770558079/*'
                  - 'arn:aws:s3:::orbit-wazuh-scripts'
                  - 'arn:aws:s3:::orbit-wazuh-scripts/*'
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-role'
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

  OrbitNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${AWS::StackName}-profile'
      Roles:
        - !Ref OrbitNodeRole

  # EBS Volume for Persistent Data
  OrbitNodeDataVolume:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !Select [0, !GetAZs '']
      Size: !Ref EbsVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: orbit-node-poc-data
        - Key: Environment
          Value: poc
        - Key: Component
          Value: node
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev
    DeletionPolicy: Snapshot

  # Elastic IP for Wazuh Manager (persists across EC2 stack deletions)
  OrbitNodeElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: orbit-node-wazuh-eip
        - Key: Environment
          Value: poc
        - Key: Component
          Value: wazuh
        - Key: Owner
          Value: orbit
        - Key: project
          Value: iiith-orbit-node
        - Key: created_by
          Value: vvithala
        - Key: resource_type
          Value: dev

Outputs:
  VpcId:
    Description: VPC ID (created or existing)
    Value: !If [CreateVpc, !Ref OrbitNodeVpc, !Ref VpcId]
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  SubnetId:
    Description: Subnet ID (created or existing)
    Value: !If [CreateSubnet, !Ref OrbitNodeSubnet, !Ref SubnetId]
    Export:
      Name: !Sub '${AWS::StackName}-SubnetId'

  SecurityGroupId:
    Description: ORBIT Node Security Group ID
    Value: !Ref OrbitNodeSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'

  InstanceProfileArn:
    Description: IAM Instance Profile ARN
    Value: !GetAtt OrbitNodeInstanceProfile.Arn
    Export:
      Name: !Sub '${AWS::StackName}-InstanceProfileArn'

  DataVolumeId:
    Description: EBS Volume ID for persistent data
    Value: !Ref OrbitNodeDataVolume
    Export:
      Name: !Sub '${AWS::StackName}-DataVolumeId'

  DataMountPath:
    Description: Mount path for persistent data
    Value: !Ref DataMountPath
    Export:
      Name: !Sub '${AWS::StackName}-DataMountPath'

  EbsDeviceName:
    Description: EBS device name for volume attachment
    Value: !Ref EbsDeviceName
    Export:
      Name: !Sub '${AWS::StackName}-EbsDeviceName'

  ElasticIP:
    Description: Elastic IP for Wazuh Manager (permanent)
    Value: !Ref OrbitNodeElasticIP
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIP'

  ElasticIPAllocationId:
    Description: Elastic IP Allocation ID
    Value: !GetAtt OrbitNodeElasticIP.AllocationId
    Export:
      Name: !Sub '${AWS::StackName}-ElasticIPAllocationId'
