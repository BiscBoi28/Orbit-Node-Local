---
- name: Install packages
  ansible.builtin.package:
    name: "{{ software_packages | default([]) }}"
    state: present
  when: software_packages | length > 0

- name: Ensure systemd services running
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop: "{{ service_list | default([]) }}"
  when: service_list is defined
  ignore_errors: yes
