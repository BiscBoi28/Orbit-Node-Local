AWSTemplateFormatVersion: '2010-09-09'
Description: ORBIT Bank - AWS Secrets Manager entries

Parameters:
  WazuhServerIp:
    Type: String
    Default: ''
    Description: Wazuh server IP (placeholder, fill via deployment.env)
  WazuhPort:
    Type: String
    Default: '1514'
  WazuhAgentGroup:
    Type: String
    Default: 'bank-simulation'
  KeyPairName:
    Type: String
    Default: ''
    Description: EC2 key pair name (from deployment.env)

Resources:
  SecretWazuh:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: njsecure-prod/wazuh
      Description: Wazuh server config for bank agents
      SecretString: !Sub |
        {"server_ip":"${WazuhServerIp}","port":"${WazuhPort}","agent_group":"${WazuhAgentGroup}"}
      Tags:
        - Key: Name
          Value: njsecure-prod-wazuh
        - Key: created_by
          Value: rkp
        - Key: project
          Value: njsecure
        - Key: environment
          Value: prod

  SecretPostgresql:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: njsecure-prod/db/postgresql
      Description: PostgreSQL credentials for bank DB
      GenerateSecretString:
        SecretStringTemplate: '{"username":"orbitadmin"}'
        GenerateStringKey: password
        PasswordLength: 24
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Name
          Value: njsecure-prod-db-postgresql
        - Key: created_by
          Value: rkp
        - Key: project
          Value: njsecure
        - Key: environment
          Value: prod

  SecretKeypair:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: njsecure-prod/ec2/keypair
      Description: EC2 key pair reference
      SecretString: !Sub |
        {"key_pair_name":"${KeyPairName}"}
      Tags:
        - Key: Name
          Value: njsecure-prod-ec2-keypair
        - Key: created_by
          Value: rkp
        - Key: project
          Value: njsecure
        - Key: environment
          Value: prod

  SecretWindowsAdmin:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: njsecure-prod/windows/admin
      Description: Windows administrator credentials
      GenerateSecretString:
        SecretStringTemplate: '{"username":"Administrator"}'
        GenerateStringKey: password
        PasswordLength: 24
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Name
          Value: njsecure-prod-windows-admin
        - Key: created_by
          Value: rkp
        - Key: project
          Value: njsecure
        - Key: environment
          Value: prod

Outputs:
  WazuhSecretArn:
    Description: ARN of njsecure-prod/wazuh secret
    Value: !Ref SecretWazuh
    Export:
      Name: !Sub '${AWS::StackName}-WazuhSecretArn'
  PostgresqlSecretArn:
    Description: ARN of njsecure-prod/db/postgresql secret
    Value: !Ref SecretPostgresql
    Export:
      Name: !Sub '${AWS::StackName}-PostgresqlSecretArn'
  KeypairSecretArn:
    Description: ARN of njsecure-prod/ec2/keypair secret
    Value: !Ref SecretKeypair
    Export:
      Name: !Sub '${AWS::StackName}-KeypairSecretArn'
  WindowsAdminSecretArn:
    Description: ARN of njsecure-prod/windows/admin secret
    Value: !Ref SecretWindowsAdmin
    Export:
      Name: !Sub '${AWS::StackName}-WindowsAdminSecretArn'
