AWSTemplateFormatVersion: '2010-09-09'
Description: 'ORBIT Bank Infrastructure - Secrets Management Stack'

Parameters:
  WazuhServerIp:
    Type: String
    Description: IP address of the Wazuh server
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}$'
    ConstraintDescription: Must be a valid IPv4 address
  
  WazuhServerPort:
    Type: Number
    Description: Port number for Wazuh server communication
    Default: 1514
    MinValue: 1
    MaxValue: 65535
  
  WazuhAgentGroup:
    Type: String
    Description: Wazuh agent group name (optional)
    Default: 'bank-infrastructure'

Resources:
  WazuhConfigSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: njsecure-prod/wazuh-config
      Description: Wazuh server configuration for bank infrastructure agents
      SecretString: !Sub |
        {
          "server_ip": "${WazuhServerIp}",
          "server_port": ${WazuhServerPort},
          "agent_group": "${WazuhAgentGroup}",
          "protocol": "tcp"
        }
      Tags:
        - Key: Name
          Value: njsecure-prod-wazuh-config
        - Key: project
          Value: ORBIT
        - Key: environment
          Value: simulation
        - Key: component
          Value: bank-infrastructure

Outputs:
  WazuhConfigSecretArn:
    Description: ARN of the Wazuh configuration secret
    Value: !Ref WazuhConfigSecret
    Export:
      Name: !Sub '${AWS::StackName}-WazuhConfigSecretArn'
