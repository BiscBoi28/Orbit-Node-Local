<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@example.invalid</email_from>
    <email_to>security@example.invalid</email_to>
    <email_maxperhour>12</email_maxperhour>
    <white_list>127.0.0.1</white_list>
    <white_list>^localhost.localdomain$</white_list>
    <white_list>127.0.0.53</white_list>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>udp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
    <ssl_manager_cert>/etc/ssl/wazuh/wazuh.manager.pem</ssl_manager_cert>
    <ssl_manager_key>/etc/ssl/wazuh/wazuh.manager-key.pem</ssl_manager_key>
    <ssl_auto_negotiate>yes</ssl_auto_negotiate>
  </auth>

  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <directories check_all="yes">/etc,/opt,/srv,/var/www,/var/lib/postgresql</directories>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>
    <ignore type="sregex">.log$|.swp$</ignore>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
  </rootcheck>

  <command>
    <name>orbit-action</name>
    <executable>orbit_action.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <command>orbit-action</command>
    <location>local</location>
    <timeout>60</timeout>
  </active-response>

  <integration>
    <name>custom-orbit-orc</name>
    <hook_url>http://orc:8000/webhook/wazuh-event</hook_url>
    <rule_id>550,554,657,18107,23502</rule_id>
    <group>vulnerability-detector,syscheck,authentication_failed,web,</group>
    <alert_format>json</alert_format>
  </integration>

  <vulnerability-detector>
    <enabled>yes</enabled>
    <interval>5m</interval>
    <run_on_start>yes</run_on_start>
    <provider name="canonical">
      <enabled>yes</enabled>
      <os>trusty,xenial,bionic,focal,jammy</os>
      <update_interval>1h</update_interval>
    </provider>
    <provider name="debian">
      <enabled>yes</enabled>
      <os>buster,bullseye,bookworm</os>
      <update_interval>1h</update_interval>
    </provider>
  </vulnerability-detector>

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>12h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <localfile>
    <log_format>json</log_format>
    <location>/orbit-alerts/orbit_alerts.log</location>
  </localfile>

  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_dir>etc/rules/local_rules</rule_dir>
  </ruleset>

  <cluster>
    <name>orbit-wazuh</name>
    <node_name>wazuh-manager</node_name>
    <node_type>master</node_type>
    <key>orbitwazuhclusterkeyphasezero1234567890</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>wazuh.manager</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>
</ossec_config>
