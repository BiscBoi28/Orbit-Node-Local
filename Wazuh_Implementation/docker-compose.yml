# docker-compose.yml
# Starts all ORBIT Node services: Neo4j, Presidio, and ORC

services:

  neo4j:
    image: neo4j:5.18-community
    container_name: orbit-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (open in web browser to view graph)
      - "7687:7687"   # Bolt connection (used by ORC app internally)
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - orbit-net

  presidio:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: orbit-presidio
    restart: unless-stopped
    ports:
      - "5001:3000"   # Presidio API (3000 inside container, exposed as 5001)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - orbit-net

  orc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbit-orc
    restart: unless-stopped
    ports:
      - "8000:8000"   # ORC API
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      presidio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - orbit-net

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  orbit-net:
    driver: bridge
